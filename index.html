<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.3/css/bootstrap.min.css">
    <style>
        body { background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; border: 1px solid #333; }
        label { font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="mb-4">Painel de Controle Overlay</h2>
        
        <div class="card p-4">
            <div class="form-group">
                <label>Título</label>
                <input type="text" id="title" class="form-control" value="NOME DO CONVIDADO">
            </div>
            <div class="form-group">
                <label>Subtítulo</label>
                <input type="text" id="subtitle" class="form-control" value="Descrição ou @arroba">
            </div>
            <div class="form-group">
                <label>Cor de Destaque</label>
                <input type="color" id="color" class="form-control" value="#ff0000">
            </div>
            <hr>
            <button class="btn btn-success btn-lg btn-block" onclick="sendData(true)">MOSTRAR NO AR</button>
            <button class="btn btn-danger btn-lg btn-block" onclick="sendData(false)">REMOVER</button>
        </div>
    </div>

    <script>
        function sendData(isVisible) {
            const data = {
                title: document.getElementById('title').value,
                subtitle: document.getElementById('subtitle').value,
                color: document.getElementById('color').value,
                visible: isVisible
            };
            localStorage.setItem('overlayData', JSON.stringify(data));
        }
    </script>
</body>
</html>
