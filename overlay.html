<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: transparent; overflow: hidden; font-family: 'Lato', sans-serif; }
        
        #lower-third {
            position: absolute;
            bottom: 50px;
            left: 50px;
            display: flex;
            align-items: center;
            opacity: 0;
            transition: all 0.5s ease-in-out;
            transform: translateX(-100px);
        }

        #lower-third.active {
            opacity: 1;
            transform: translateX(0);
        }

        .bar {
            width: 5px;
            height: 60px;
            background: #ff0000; /* Cor padrão */
        }

        .content {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 30px;
        }

        h1 { margin: 0; font-size: 24px; text-transform: uppercase; }
        p { margin: 0; font-size: 16px; color: #ccc; }
    </style>
</head>
<body>

    <div id="lower-third">
        <div class="bar" id="ui-bar"></div>
        <div class="content">
            <h1 id="ui-title">Título</h1>
            <p id="ui-subtitle">Subtítulo</p>
        </div>
    </div>

    <script>
        function updateOverlay() {
            const data = JSON.parse(localStorage.getItem('overlayData')) || {};
            
            if (data.visible) {
                document.getElementById('ui-title').innerText = data.title || "";
                document.getElementById('ui-subtitle').innerText = data.subtitle || "";
                document.getElementById('ui-bar').style.backgroundColor = data.color || "red";
                document.getElementById('lower-third').classList.add('active');
            } else {
                document.getElementById('lower-third').classList.remove('active');
            }
        }

        // Verifica mudanças a cada 100ms
        window.addEventListener('storage', updateOverlay);
        setInterval(updateOverlay, 500); // Backup check
    </script>
</body>
</html>
